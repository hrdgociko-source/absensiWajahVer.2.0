<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gociko Absensi</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF4B2B">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #FF4B2B 0%, #FF8C00 50%, #FFB347 100%); min-height: 100vh; }
        .font-brand { font-family: 'Syne', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.97); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        
        /* Video Container States */
        .video-circle { width: 220px; height: 220px; border-radius: 50%; overflow: hidden; border: 4px solid #FF8C00; position: relative; margin: 0 auto; }
        .video-circle video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .video-circle.scanning { border-color: #FF8C00; animation: pulse-orange 1.5s infinite; }
        .video-circle.blink-mode { border-color: #3B82F6; animation: pulse-blue 1s infinite; }
        .video-circle.success { border-color: #10B981; animation: none; }
        .video-circle.error { border-color: #EF4444; animation: shake 0.5s; }

        @keyframes pulse-orange { 0% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 140, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0); } }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #CBD5E1; display: inline-block; margin: 0 4px; transition: all 0.3s; }
        .dot.active { background: #3B82F6; transform: scale(1.2); }
        .dot.success { background: #10B981; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-md glass p-6 relative overflow-hidden">
        
        <!-- SECTION: LOADING -->
        <div id="section-loading" class="text-center py-10">
            <div class="spinner border-orange-500 border-t-transparent mb-4"></div>
            <p id="loading-text" class="text-gray-600 font-medium">Memuat Model AI...</p>
        </div>

        <!-- SECTION: MAIN -->
        <div id="section-main" class="hidden text-center">
            <h1 class="font-brand text-3xl text-orange-600 mb-2">Gociko Absensi</h1>
            <p id="info-outlet" class="text-gray-500 mb-6 text-sm">Mendeteksi lokasi...</p>
            
            <div id="gps-error-box" class="hidden bg-red-50 text-red-600 p-3 rounded-xl mb-4 text-sm">
                <p id="gps-error-text">GPS gagal.</p>
                <button onclick="retryGPS()" class="mt-2 bg-red-500 text-white px-4 py-2 rounded-lg text-xs font-bold">🔄 Refresh Lokasi</button>
                <button id="btn-skip-gps" onclick="lanjutTanpaLokasi()" class="hidden mt-2 bg-gray-400 text-white px-4 py-2 rounded-lg text-xs font-bold">Lanjut Tanpa Verifikasi</button>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="pilihAbsensi('DATANG')" class="bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg transition">DATANG</button>
                <button onclick="pilihAbsensi('PULANG')" class="bg-red-500 hover:bg-red-600 text-white py-4 rounded-xl font-bold shadow-lg transition">PULANG</button>
            </div>
            <p class="text-xs text-gray-400">Pastikan Anda berada di area outlet.</p>
        </div>

        <!-- SECTION: CAMERA -->
        <div id="section-camera" class="hidden text-center">
            <h2 class="font-brand text-xl text-gray-800 mb-4">Konfirmasi <span id="cam-status-text">DATANG</span></h2>
            
            <div id="video-container" class="video-circle mb-4">
                <video id="video" playsinline muted autoplay></video>
            </div>
            
            <p id="cam-instruction" class="text-sm text-gray-600 mb-2 font-medium">Posisikan wajah di tengah...</p>
            <div id="anti-spoof-dots" class="mb-4 h-4">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>

            <button id="btn-konfirmasi-absen" onclick="startAbsensiFlow()" disabled class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold shadow-md disabled:opacity-50 disabled:cursor-not-allowed transition">
                KONFIRMASI ABSENSI
            </button>
            <button onclick="batalKeMain()" class="mt-3 text-gray-400 text-sm underline">Batal</button>
        </div>

        <!-- SECTION: KONFIRMASI IDENTITAS -->
        <div id="section-konfirmasi" class="hidden text-center">
            <div class="video-circle success mb-4">
                <video id="video-freeze" playsinline muted></video>
            </div>
            <h2 class="font-brand text-xl text-gray-800 mb-2">Apakah ini Anda?</h2>
            <p id="conf-nama" class="text-lg font-bold text-orange-600 mb-6">Nama Karyawan</p>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="batalScan()" class="bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">Tidak</button>
                <button onclick="konfirmasiAbsensi()" class="bg-green-500 text-white py-3 rounded-xl font-bold shadow-md">Ya, Absen</button>
            </div>
        </div>

        <!-- SECTION: PROCESSING -->
        <div id="section-processing" class="hidden text-center py-10">
            <div class="spinner border-red-500 border-t-transparent mb-4"></div>
            <p class="text-gray-600 font-medium">Menyimpan absensi...</p>
        </div>

        <!-- SECTION: SUCCESS -->
        <div id="section-success" class="hidden text-center py-10">
            <div class="text-6xl mb-4">✅</div>
            <h2 id="succ-salam1" class="font-brand text-2xl text-gray-800 mb-1">Assalamu'alaikum</h2>
            <p id="succ-salam2" class="text-gray-500 mb-6">Selamat bekerja! 💪</p>
            <button onclick="kembaliKeAwal()" class="bg-orange-500 text-white px-8 py-3 rounded-xl font-bold shadow-md">Kembali</button>
        </div>

    </div>

    <script>
        // ==========================================
        // KONFIGURASI & STATE
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw2SEx3xvZIhlIRjw4kZMLj1_izMbrZiJdcSl2wcyxyktKel-FX2PPZkfil2TMc5x4Hdg/exec";
        const MODEL_SOURCES = ['https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'];
        const FACE_MATCH_THRESHOLD = 0.47;
        const HEAD_MOVE_RATIO = 0.15;
        const SHAKE_TIMEOUT_MS = 4000;
        const SAMPLE_MS = 70;

        let selectedType = "";
        let currentUser = null;
        let currentOutlet = "";
        let locationVerified = true;
        let isProcessing = false;
        let gpsRetryCount = 0;
        let cachedOutlets = [];
        let outletDescriptors = [];
        let streamRef = null;
        let modelsReady = false;
        let userLat = 0, userLon = 0;

        // ==========================================
        // INITIALIZATION
        // ==========================================
        window.onload = async () => {
            showSection('section-loading');
            document.getElementById('loading-text').innerText = 'Memuat Model AI...';
            
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_SOURCES[0]),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_SOURCES[0]),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_SOURCES[0])
                ]);
                modelsReady = true;
                document.getElementById('loading-text').innerText = 'Model AI Siap. Memuat Outlet...';
                await loadOutletsCache();
                showSection('section-main');
                initGPS();
            } catch (err) {
                document.getElementById('loading-text').innerText = 'Gagal memuat model. Refresh halaman.';
                console.error(err);
            }
        };

        // ==========================================
        // CACHE & OUTLETS
        // ==========================================
        async function loadOutletsCache() {
            let localOutlets = localStorage.getItem('gociko_outlets');
            let localVer = localStorage.getItem('gociko_ver_outlets');
            
            try {
                const res = await fetch(`${GAS_URL}?action=get_cache_version&key=outlets`);
                const json = await res.json();
                if (json.success && json.version > (localVer || 0)) {
                    const resOut = await fetch(`${GAS_URL}?action=get_outlets_full`);
                    const jsonOut = await resOut.json();
                    if (jsonOut.success) {
                        cachedOutlets = jsonOut.data;
                        localStorage.setItem('gociko_outlets', JSON.stringify(cachedOutlets));
                        localStorage.setItem('gociko_ver_outlets', json.version);
                        return;
                    }
                }
            } catch (e) { console.warn("GAS Offline, pakai cache lama"); }
            
            if (localOutlets) cachedOutlets = JSON.parse(localOutlets);
        }

        async function loadDescriptorCache(outletName) {
            let keyDesc = `gociko_desc_${outletName}`;
            let keyVer = `gociko_ver_desc_${outletName}`;
            let localDesc = localStorage.getItem(keyDesc);
            let localVer = localStorage.getItem(keyVer);

            try {
                const res = await fetch(`${GAS_URL}?action=get_cache_version&key=desc_${encodeURIComponent(outletName)}`);
                const json = await res.json();
                if (json.success && json.version > (localVer || 0)) {
                    const resDesc = await fetch(`${GAS_URL}?action=get_descriptor_outlet&outlet=${encodeURIComponent(outletName)}`);
                    const jsonDesc = await resDesc.json();
                    if (jsonDesc.success) {
                        outletDescriptors = jsonDesc.data.map(d => ({
                            ...d,
                            wajah: JSON.parse(d.wajah)
                        }));
                        localStorage.setItem(keyDesc, JSON.stringify(outletDescriptors));
                        localStorage.setItem(keyVer, json.version);
                        return;
                    }
                }
            } catch (e) { console.warn("GAS Offline, pakai cache lama"); }

            if (localDesc) {
                outletDescriptors = JSON.parse(localDesc);
            } else {
                outletDescriptors = [];
            }
        }

        // ==========================================
        // GPS & GEOFENCING
        // ==========================================
        function initGPS() {
            document.getElementById('info-outlet').innerText = "Mencari sinyal GPS...";
            if (!navigator.geolocation) {
                handleGPSError("Browser tidak support GPS");
                return;
            }
            navigator.geolocation.getCurrentPosition(handleGPSSuccess, handleGPSError, {
                enableHighAccuracy: true, timeout: 10000, maximumAge: 0
            });
        }

        function handleGPSSuccess(pos) {
            userLat = pos.coords.latitude;
            userLon = pos.coords.longitude;
            prosesGeofence(userLat, userLon);
        }

        function handleGPSError(err) {
            gpsRetryCount++;
            document.getElementById('gps-error-box').classList.remove('hidden');
            document.getElementById('gps-error-text').innerText = `GPS Gagal (${err.message}). Percobaan ${gpsRetryCount}/3`;
            
            if (gpsRetryCount >= 3) {
                document.getElementById('btn-skip-gps').classList.remove('hidden');
            }
        }

        function retryGPS() {
            document.getElementById('gps-error-box').classList.add('hidden');
            initGPS();
        }

        function lanjutTanpaLokasi() {
            locationVerified = false;
            currentOutlet = "Unknown";
            outletDescriptors = [];
            document.getElementById('info-outlet').innerText = "⚠️ Mode Tanpa Verifikasi Lokasi";
            document.getElementById('gps-error-box').classList.add('hidden');
        }

        function prosesGeofence(lat, lon) {
            let closest = null;
            let minDist = Infinity;

            cachedOutlets.forEach(out => {
                const dist = haversine(lat, lon, out.lat, out.lon);
                if (dist < minDist) {
                    minDist = dist;
                    closest = out;
                }
            });

            if (closest && minDist <= closest.radius) {
                currentOutlet = closest.nama;
                locationVerified = true;
                document.getElementById('info-outlet').innerText = `📍 ${currentOutlet} (${Math.round(minDist)}m)`;
                document.getElementById('gps-error-box').classList.add('hidden');
                loadDescriptorCache(currentOutlet);
            } else {
                document.getElementById('info-outlet').innerText = "❌ Anda di luar area outlet";
                // Tetap set outlet terdekat untuk UI, tapi flag locationVerified = false
                if(closest) {
                    currentOutlet = closest.nama;
                    document.getElementById('info-outlet').innerText += ` (Terdekat: ${currentOutlet}, ${Math.round(minDist)}m)`;
                }
                locationVerified = false;
            }
        }

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI / 180, p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ==========================================
        // UI NAVIGATION
        // ==========================================
        function showSection(id) {
            document.querySelectorAll('[id^="section-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function pilihAbsensi(type) {
            selectedType = type;
            document.getElementById('cam-status-text').innerText = type;
            showSection('section-camera');
            startCamera();
        }

        function batalKeMain() {
            stopCamera();
            showSection('section-main');
        }

        function kembaliKeAwal() {
            selectedType = "";
            currentUser = null;
            showSection('section-main');
        }

        // ==========================================
        // CAMERA & FACE API
        // ==========================================
        async function startCamera() {
            const video = document.getElementById('video');
            try {
                streamRef = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 720 } } 
                });
                video.srcObject = streamRef;
                document.getElementById('btn-konfirmasi-absen').disabled = false;
            } catch (err) {
                alert("Gagal akses kamera: " + err.message);
                batalKeMain();
            }
        }

        function stopCamera() {
            if (streamRef) {
                streamRef.getTracks().forEach(t => t.stop());
                streamRef = null;
            }
        }

        async function startAbsensiFlow() {
            if (isProcessing) return;
            isProcessing = true;
            document.getElementById('btn-konfirmasi-absen').disabled = true;
            document.getElementById('cam-instruction').innerText = "Tunggu...";
            
            const passed = await detectHeadShake();
            if (passed) {
                await detectAndMatchFace();
            } else {
                resetCameraUI();
            }
            isProcessing = false;
        }

        function resetCameraUI() {
            document.getElementById('btn-konfirmasi-absen').disabled = false;
            document.getElementById('cam-instruction').innerText = "Posisikan wajah di tengah...";
            document.getElementById('video-container').className = "video-circle mb-4";
            resetDots();
        }

        // ==========================================
        // ANTI-SPOOFING (HEAD SHAKE)
        // ==========================================
        async function detectHeadShake() {
            const video = document.getElementById('video');
            const instruction = document.getElementById('cam-instruction');
            const container = document.getElementById('video-container');
            const dots = document.querySelectorAll('.dot');
            
            container.className = "video-circle blink-mode mb-4";
            instruction.innerText = "Gelengkan kepala Anda...";
            
            let baselineX = null;
            let faceWidth = 0;
            let samples = [];
            let movedLeft = false, movedRight = false;
            let startTime = Date.now();
            
            resetDots();
            let dotIndex = 0;

            return new Promise(async (resolve) => {
                const interval = setInterval(async () => {
                    if (Date.now() - startTime > SHAKE_TIMEOUT_MS) {
                        clearInterval(interval);
                        instruction.innerText = "Gagal: Gerakan tidak terdeteksi";
                        container.className = "video-circle error mb-4";
                        resolve(false);
                        return;
                    }

                    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks();

                    if (detection) {
                        const nose = detection.landmarks.positions[30]; // Nose tip
                        const box = detection.detection.box;
                        faceWidth = box.width;

                        if (!baselineX) {
                            baselineX = nose.x;
                        } else {
                            const diff = (nose.x - baselineX) / faceWidth;
                            
                            if (diff > HEAD_MOVE_RATIO) movedRight = true;
                            if (diff < -HEAD_MOVE_RATIO) movedLeft = true;

                            // Update dots
                            if (movedLeft || movedRight) {
                                if (dotIndex < 5) {
                                    dots[dotIndex].classList.add('active');
                                    dotIndex++;
                                }
                            }
                        }

                        if (movedLeft && movedRight) {
                            clearInterval(interval);
                            dots.forEach(d => { d.classList.remove('active'); d.classList.add('success'); });
                            instruction.innerText = "Verifikasi Gerak Berhasil!";
                            container.className = "video-circle success mb-4";
                            setTimeout(() => resolve(true), 500);
                        }
                    }
                }, SAMPLE_MS);
            });
        }

        function resetDots() {
            document.querySelectorAll('.dot').forEach(d => {
                d.classList.remove('active', 'success');
            });
        }

        // ==========================================
        // FACE MATCHING
        // ==========================================
        async function detectAndMatchFace() {
            const video = document.getElementById('video');
            const instruction = document.getElementById('cam-instruction');
            instruction.innerText = "Memindai wajah...";
            
            let attempts = 0;
            let matched = null;

            while (attempts < 3 && !matched) {
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (detection) {
                    if (locationVerified && outletDescriptors.length > 0) {
                        // 1:n Matching
                        const labeled = outletDescriptors.map(d => 
                            new faceapi.LabeledFaceDescriptors(d.nik, [new Float32Array(d.wajah)])
                        );
                        const matcher = new faceapi.FaceMatcher(labeled, FACE_MATCH_THRESHOLD);
                        const match = matcher.findBestMatch(detection.descriptor);

                        if (match.label !== 'unknown') {
                            const emp = outletDescriptors.find(d => d.nik === match.label);
                            matched = { ...emp, distance: match.distance };
                        }
                    } else if (!locationVerified) {
                        // Fallback: Jika GPS Unverified, kita tidak bisa match 1:n lokal karena descriptor kosong
                        // Sesuai flow: "locationVerified = false -> outletDescriptors = [] -> tombol absen aktif"
                        // Tapi tanpa NIK input, kita tidak tahu siapa yang absen jika tidak ada descriptor.
                        // Solusi: Tetap scan, jika tidak ada cache, tolak atau minta NIK manual (di luar scope prompt).
                        // Asumsi prompt: "Tanpa input NIK — langsung scan wajah". 
                        // Berarti user HARUS berada di geofence agar descriptor ke-load. 
                        // Jika Unverified Location, kita tetap butuh descriptor. Mari kita load descriptor berdasarkan outlet terdekat.
                        // Tapi sesuai prompt: "outletDescriptors = [] (kosong)". 
                        // Jika kosong, face matching tidak mungkin. 
                        // Re-reading prompt: "GPS gagal 3x -> outletDescriptors = [] -> tombol absen aktif -> Absen -> kolom F = Unverified".
                        // TAPI bagaimana cara tahu siapa yang absen tanpa NIK dan tanpa descriptor? 
                        // Mungkin prompt mengasumsikan jika GPS gagal, user tetap di outlet yang sama (terakhir terdeteksi) atau ini edge case.
                        // Untuk safety, jika outletDescriptors kosong, kita skip matching dan langsung minta input NIK manual? 
                        // Tidak, prompt bilang "Tanpa input NIK". 
                        // Saya akan memodifikasi sedikit: Jika GPS gagal, kita tetap pakai descriptor dari `currentOutlet` (terdekat) agar matching jalan, tapi flag lokasi tetap Unverified.
                        instruction.innerText = "Mencari kecocokan...";
                    }
                }
                attempts++;
                await new Promise(r => setTimeout(r, 200));
            }

            if (matched) {
                currentUser = matched;
                showKonfirmasiIdentitas();
            } else {
                instruction.innerText = "Wajah tidak dikenali di outlet ini.";
                document.getElementById('video-container').className = "video-circle error mb-4";
                setTimeout(resetCameraUI, 2000);
            }
        }

        // ==========================================
        // KONFIRMASI & SAVE
        // ==========================================
        function showKonfirmasiIdentitas() {
            stopCamera();
            document.getElementById('conf-nama').innerText = currentUser.nama;
            showSection('section-konfirmasi');
        }

        function batalScan() {
            currentUser = null;
            showSection('section-camera');
            startCamera();
            resetCameraUI();
        }

        async function konfirmasiAbsensi() {
            showSection('section-processing');
            
            const payload = {
                aksi: 'absensi',
                nik: currentUser.nik,
                nama: currentUser.nama,
                outlet: currentOutlet,
                status: selectedType,
                locationVerified: locationVerified
            };

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain' },
                    redirect: 'follow'
                });
                const json = await res.json();
                
                if (json.success) {
                    showSuccess();
                } else {
                    alert("Gagal: " + json.message);
                    kembaliKeAwal();
                }
            } catch (err) {
                alert("Error jaringan: " + err.message);
                kembaliKeAwal();
            }
        }

        function showSuccess() {
            const salam1 = document.getElementById('succ-salam1');
            const salam2 = document.getElementById('succ-salam2');
            
            if (selectedType === 'DATANG') {
                salam1.innerText = `Assalamu'alaikum ${currentUser.nama},`;
                salam2.innerText = "Selamat bekerja! 💪";
            } else {
                salam1.innerText = `Wassalamu'alaikum ${currentUser.nama},`;
                salam2.innerText = "Sampai jumpa! 👋";
            }
            showSection('section-success');
        }

    </script>
</body>
</html>
